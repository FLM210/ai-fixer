# 仅启动后端 + 前端，复用本机已有的 infra-postgres 和 infra-redis
# 使用方式: docker-compose -f docker-compose.dev.yml up -d --build

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://app_user:app_password@host.docker.internal:5432/app_db
      REDIS_URL: redis://:redis_password@host.docker.internal:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload --loop asyncio"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./custom_plugins:/app/custom_plugins

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY: http://backend:8080
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  frontend_node_modules:
