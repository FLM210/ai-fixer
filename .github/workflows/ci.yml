name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fixer
          POSTGRES_PASSWORD: fixer
          POSTGRES_DB: fixer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fixer"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://fixer:fixer@localhost:5432/fixer
      LLM_PROVIDER: anthropic
      LLM_BASE_URL: https://api.anthropic.com
      LLM_API_KEY: sk-ci-placeholder
      LLM_MODEL: claude-sonnet-4-6
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install 3.11
      - name: Install deps
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check app tests
      - name: Type check
        run: uv run mypy app
      - name: Migrate
        run: uv run alembic upgrade head
      - name: Test
        run: uv run pytest --cov=app --cov-report=term-missing
