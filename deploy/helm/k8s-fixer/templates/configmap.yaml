apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k8s-fixer.fullname" . }}-config
  labels:
    {{- include "k8s-fixer.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.log_level | quote }}
  LLM_PROVIDER: {{ .Values.config.llm_provider | quote }}
  LLM_MODEL: {{ .Values.config.llm_model | quote }}
  LLM_MAX_TURNS: {{ .Values.config.llm_max_turns | quote }}
  LLM_TIMEOUT_SECONDS: {{ .Values.config.llm_timeout_seconds | quote }}
  REDIS_URL: {{ .Values.config.redis_url | quote }}
