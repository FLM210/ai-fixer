apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-fixer.fullname" . }}-secrets
  labels:
    {{- include "k8s-fixer.labels" . | nindent 4 }}
type: Opaque
data:
  DATABASE_URL: {{ .Values.secrets.database_url | b64enc | quote }}
  REDIS_URL: {{ .Values.secrets.redis_url | b64enc | quote }}
  LARK_APP_ID: {{ .Values.secrets.lark_app_id | b64enc | quote }}
  LARK_APP_SECRET: {{ .Values.secrets.lark_app_secret | b64enc | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropic_api_key | b64enc | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openai_api_key | b64enc | quote }}
  CARD_SIGNING_KEY: {{ .Values.secrets.card_signing_key | b64enc | quote }}
