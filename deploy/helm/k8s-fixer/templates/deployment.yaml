apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-fixer.fullname" . }}
  labels:
    {{- include "k8s-fixer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "k8s-fixer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "k8s-fixer.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "k8s-fixer.fullname" . }}-config
            - secretRef:
                name: {{ include "k8s-fixer.fullname" . }}-secrets
