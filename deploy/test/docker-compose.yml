services:
  app:
    image: ai-fixer:latest
    container_name: ai-fixer
    restart: unless-stopped
    network_mode: host
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/fixer}
      - REDIS_URL=${REDIS_URL:-redis://127.0.0.1:6379/0}
      - SERVE_STATIC=1
      - LOG_LEVEL=INFO
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fixer.rule=Host(`fixer.dlbppx.online`)"
      - "traefik.http.routers.fixer.entrypoints=websecure"
      - "traefik.http.routers.fixer.tls.certresolver=letsencrypt"
      - "traefik.http.services.fixer.loadbalancer.server.url=http://172.17.0.1:8080"
